version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_management_system
      MYSQL_USER: hms_user
      MYSQL_PASSWORD: hms_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    image: hospital-management-system:latest
    container_name: hms-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospital_management_system?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: hms_user
      SPRING_DATASOURCE_PASSWORD: hms_password
      JWT_SECRET: "MyVeryLongSecureJWTSecretKeyForHS512AlgorithmThatIsAtLeast512BitsLongAndSecure2024"
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hms-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hms-frontend
    ports:
      - "3000:3000"
    networks:
      - hms-network
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  hms-network:
    driver: bridge
